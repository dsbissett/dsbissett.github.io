  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <text
    x="16" y="23"
    text-anchor="middle"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="21"
    fill="#00fff5"
    filter="url(#glow)"
  >D</text>
